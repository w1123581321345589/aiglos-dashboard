[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/signup"
  to = "/.netlify/functions/signup"
  status = 200

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/get-key"
  to = "/.netlify/functions/get-key"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://js.stripe.com; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; frame-src https://js.stripe.com"

[[redirects]]
  from = "/scan"
  to   = "/website/scan.html"
  status = 200

[[redirects]]
  from = "/docs"
  to   = "https://github.com/w1123581321345589/aiglos"
  status = 302
